openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LandMate API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: landmate
    description: LandMate AI document analysis
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /landmate/analyze:
    post:
      operationId: analyzeDocument
      tags: [landmate]
      summary: Analyze a land document
      description: Analyze a document using Claude AI for explanation or red flag detection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeDocumentRequest"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeDocumentResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /landmate/process-guidance:
    post:
      operationId: getProcessGuidance
      tags: [landmate]
      summary: Get GLC process guidance
      description: Get step-by-step guidance for a GLC process
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessGuidanceRequest"
      responses:
        "200":
          description: Process guidance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessGuidanceResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /landmate/form-assistance:
    post:
      operationId: getFormAssistance
      tags: [landmate]
      summary: Get GLC form filling assistance
      description: Get field-by-field guidance for filling a GLC form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormAssistanceRequest"
      responses:
        "200":
          description: Form assistance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormAssistanceResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /landmate/chat:
    post:
      operationId: chatWithLandmate
      tags: [landmate]
      summary: Chat with LandMate Q&A
      description: Ask follow-up questions in context of the analyzed document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Chat response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    AnalyzeDocumentRequest:
      type: object
      properties:
        documentText:
          type: string
          description: Extracted text from the land document
        documentType:
          type: string
          enum: [indenture, titleDeed, lease, glcForm, unknown]
        mode:
          type: string
          enum: [explain, redFlags]
        language:
          type: string
          enum: [english, twi, pidgin]
          default: english
        fileName:
          type: string
          description: Original file name for display
      required:
        - documentText
        - documentType
        - mode

    AnalyzeDocumentResponse:
      type: object
      properties:
        summary:
          type: string
        keyPoints:
          type: array
          items:
            type: string
        importantDates:
          type: array
          items:
            $ref: "#/components/schemas/ImportantDate"
        nextSteps:
          type: array
          items:
            type: string
        redFlags:
          type: array
          items:
            $ref: "#/components/schemas/RedFlag"
        overallRiskLevel:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        documentType:
          type: string
        disclaimer:
          type: string
      required:
        - summary
        - keyPoints
        - nextSteps
        - disclaimer

    ImportantDate:
      type: object
      properties:
        label:
          type: string
        value:
          type: string
        daysUntil:
          type: number
          nullable: true
      required:
        - label
        - value

    RedFlag:
      type: object
      properties:
        severity:
          type: string
          enum: [HIGH, MEDIUM, LOW]
        issue:
          type: string
        explanation:
          type: string
        recommendation:
          type: string
      required:
        - severity
        - issue
        - explanation
        - recommendation

    ProcessGuidanceRequest:
      type: object
      properties:
        processName:
          type: string
        language:
          type: string
          enum: [english, twi, pidgin]
          default: english
      required:
        - processName

    ProcessGuidanceResponse:
      type: object
      properties:
        processName:
          type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/ProcessStep"
        requiredDocuments:
          type: array
          items:
            type: string
        estimatedFees:
          type: string
        estimatedDuration:
          type: string
        offices:
          type: array
          items:
            type: string
        disclaimer:
          type: string
      required:
        - processName
        - steps
        - disclaimer

    ProcessStep:
      type: object
      properties:
        stepNumber:
          type: number
        title:
          type: string
        description:
          type: string
        office:
          type: string
          nullable: true
        fee:
          type: string
          nullable: true
        documents:
          type: array
          items:
            type: string
      required:
        - stepNumber
        - title
        - description

    FormAssistanceRequest:
      type: object
      properties:
        documentText:
          type: string
        documentType:
          type: string
        language:
          type: string
          enum: [english, twi, pidgin]
          default: english
      required:
        - documentText
        - documentType

    FormAssistanceResponse:
      type: object
      properties:
        formName:
          type: string
        fieldGuidance:
          type: array
          items:
            $ref: "#/components/schemas/FieldGuidance"
        commonMistakes:
          type: array
          items:
            type: string
        summary:
          type: string
        disclaimer:
          type: string
      required:
        - formName
        - fieldGuidance
        - summary
        - disclaimer

    FieldGuidance:
      type: object
      properties:
        fieldName:
          type: string
        instructions:
          type: string
        example:
          type: string
          nullable: true
        required:
          type: boolean
      required:
        - fieldName
        - instructions
        - required

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content

    ChatRequest:
      type: object
      properties:
        message:
          type: string
        conversationHistory:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        documentContext:
          type: string
          nullable: true
        documentType:
          type: string
          nullable: true
        language:
          type: string
          enum: [english, twi, pidgin]
          default: english
      required:
        - message
        - conversationHistory

    ChatResponse:
      type: object
      properties:
        response:
          type: string
        disclaimer:
          type: string
      required:
        - response
        - disclaimer

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
