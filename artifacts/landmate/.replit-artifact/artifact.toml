kind = "web"
previewPath = "/"
title = "LandMate"
version = "1.0.0"
id = "artifacts/landmate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25137

[services.development]
run = "pnpm --filter @workspace/landmate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/landmate", "run", "build" ]
publicDir = "artifacts/landmate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25137"
BASE_PATH = "/"
